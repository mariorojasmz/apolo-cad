category: chumaceras
# Chumaceras de PIE tipo UCP (soporte + rodamiento de inserto), cotas comerciales
# UCP2xx (FYH/NTN/estándar). Builder pillow_block: cuerpo fundido acampanado + base de
# 2 patas ranuradas + inserto con collar/prisioneros + grasera. El nº = serie del bore.
# Cotas (mm): H altura al centro del eje, H1 altura total, L largo, J entre pernos,
# A ancho de base, N Ø agujero de perno, Bi ancho del inserto, s espesor de base.
# C_kN = capacidad dinámica del INSERTO UC2xx (≡ rodamiento 62xx, nominal NSK/NTN,
# ±10% entre fabricantes) para la vida L10 (engineering/bearings.py).
# Verificadas contra tablas UCP publicadas (FYH/NTN/AUbearing/Mechforged).
# cost = USD REFERENCIAL por unidad (mercado aprox.; actualizar con proveedor para cotizar en firme).
families:
  - family: "UCP"
    name_tpl: "Chumacera de pie {ref}"
    description_tpl: "Soporte de pie con rodamiento de inserto, eje Ø{d} mm, altura al centro {H} mm, pernos a {J} mm; hierro fundido."
    builder: pillow_block
    param_keys: [d, H, H1, L, J, A, N, Bi, s]
    specs_common:
      tipo: "chumacera de pie (UCP) con rodamiento de inserto"
      material: "hierro fundido"
      montaje: "2 pernos, base con agujeros ranurados"
      norma: "estándar comercial UC/UCP (FYH/NTN)"
    variants:
      - {ref: "UCP204", d: 20, H: 33.3, H1: 65, L: 127, J: 95,  A: 38, N: 12, Bi: 31.0, s: 12.7, C_kN: 12.7, carga_kg: 100, cost: 9, weight: 0.62}
      - {ref: "UCP205", d: 25, H: 36.5, H1: 71, L: 140, J: 105, A: 38, N: 13, Bi: 34.1, s: 14.3, C_kN: 14.0, carga_kg: 130, cost: 11, weight: 0.78}
      - {ref: "UCP206", d: 30, H: 42.9, H1: 82, L: 165, J: 121, A: 44, N: 17, Bi: 38.1, s: 15.9, C_kN: 19.5, carga_kg: 180, cost: 14, weight: 1.10}
      - {ref: "UCP207", d: 35, H: 47.6, H1: 92, L: 167, J: 127, A: 48, N: 17, Bi: 42.9, s: 17.5, C_kN: 25.5, carga_kg: 250, cost: 18, weight: 1.35}
      - {ref: "UCP208", d: 40, H: 49.2, H1: 99, L: 184, J: 137, A: 52, N: 17, Bi: 49.2, s: 19.0, C_kN: 30.7, carga_kg: 320, cost: 22, weight: 1.65}
  # --- Chumaceras de BRIDA CUADRADA de 4 pernos (UCF): para atornillar a una cara
  # VERTICAL, eje perpendicular al plano de montaje. Cotas verificadas (KG/NTN/Timken).
  - family: "UCF"
    name_tpl: "Chumacera de brida cuadrada {ref}"
    description_tpl: "Soporte de brida CUADRADA (4 pernos) con rodamiento de inserto, eje Ø{d} mm, brida {size_w}×{size_w} mm, pernos a {bolt_span} mm; hierro fundido."
    builder: flange_bearing
    param_keys: [d, flange, size_w, size_h, bolt_span, N, Bi, s]
    specs_common:
      tipo: "chumacera de brida cuadrada (UCF), 4 pernos"
      material: "hierro fundido"
      montaje: "4 pernos a cara vertical (eje perpendicular)"
      norma: "estándar comercial UC/UCF (FYH/NTN)"
      flange: "cuadrada"
    variants:
