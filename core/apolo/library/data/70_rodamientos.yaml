category: rodamientos
# Rodamientos rígidos de bolas métricos. Dimensiones de contorno d×D×B según ISO 15
# (series 6000 extra-ligera, 6200 ligera, 6300 media, 6400 pesada). Modelados como
# anillo macizo por revolución (sin pistas/bolas); el peso es la aproximación del
# anillo de acero. Familia paramétrica: una geometría, N variantes.
# C_kN = capacidad de carga dinámica NOMINAL (ISO 281) para la vida L10; valores
# aproximados de catálogos NSK/NTN (varían ±10% entre fabricantes — verificar con
# el proveedor para una selección crítica). La consume engineering/bearings.py.
# cost = USD REFERENCIAL por unidad (mercado aprox.; actualizar con proveedor para cotizar en firme).
families:
  - name_tpl: "Rodamiento {ref}"
    description_tpl: "Rígido de bolas {ref} (d{d}×D{D}×B{B}, ISO 15)."
    builder: bearing
    param_keys: [d, D, B]
    weight_formula: "7.85e-6 * 0.785 * (D*D - d*d) * B"
    specs_common: {tipo: "rígido de bolas", material: "acero al cromo", norma: "ISO 15"}
    variants:
